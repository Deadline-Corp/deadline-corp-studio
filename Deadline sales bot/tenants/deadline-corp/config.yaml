# =============================================================================
# Deadline Corp — tenant configuration
# =============================================================================
# Loaded by services/tenant.py::load_tenant() at startup.
# When extracting the skeleton, copy tenants/_template/ → tenants/<client>/ and
# edit values here. Secrets live in tenants/<slug>/secrets.env (gitignored).
# =============================================================================

tenant_slug: deadline-corp
display_name: Deadline Corp
languages: [ru, en]

# --- Brand voice (Notion §6) ---
brand:
  bot_persona_name: "Deadline Agent"
  system_prompt_path: "tenants/deadline-corp/system_prompt.md"
  greeting:
    ru: "Привет. Опишите задачу — план и срок прилетят раньше чем уберёте руки от клавиатуры."
    en: "Hi. Drop the brief — plan and timeline will arrive before you take your hands off the keyboard."

# --- Channels (Notion §2) ---
# enabled=false → channel routed to NoOp, webhook returns 200 but does nothing.
# Lets us add new channels without code change.
channels:
  telegram:
    enabled: true
    bot_username: "@Deadline_Corp_bot"
    operator_group_id_env: TELEGRAM_OPERATOR_GROUP_ID  # value from .env
  instagram:
    enabled: true
    page_id_env: META_PAGE_ID
  messenger:
    enabled: true
  website:
    enabled: true
    embed_url: "https://deadlinecorp.com"
    widget_position: bottom-right
  whatsapp:
    enabled: false   # Notion §2 deferred
  email:
    enabled: false   # Notion §2 deferred

# --- LLM (Notion §6 brain) ---
llm:
  provider: openrouter   # openrouter | ollama
  primary_model: "meta-llama/llama-3.3-70b-instruct"
  fallback_model: "deepseek/deepseek-chat"
  temperature: 0.2
  max_tokens: 1200

# --- Embeddings + Vector store (RAG) ---
embeddings:
  model: "BAAI/bge-m3"
  device: cpu
  vector_store: pgvector   # pgvector | chroma

# --- Knowledge Base ---
kb:
  path: "kb"   # relative to project root (Deadline sales bot/)
  chunk_size: 500
  chunk_overlap: 50

# --- CRM (Phase 0c-2, this ADR) ---
crm:
  provider_env: CRM_PROVIDER       # hubspot | bitrix24 | noop, value from .env
  pipeline_name: "Deadline Sales"
  auto_create_pipeline: true       # auto-create custom pipeline + properties on first startup
  log_messages: true               # mirror lead/bot/operator messages to CRM timeline
  batch_interval_sec: 3            # event queue flush cadence
  retry_max_attempts: 3
  retry_backoff_sec: [1, 3, 10]

# --- Lead Funnel (Notion §20) ---
funnel:
  # Active stages — 11 stages from Notion §20
  stages:
    - new_lead
    - in_dialog
    - qualified
    - nda
    - on_call
    - tz_approved
    - proposal
    - prepayment
    - in_work
    - completed_won
    - post_sale
  # Lost stage with reasons — Notion §20
  lost_reasons:
    - price
    - not_our_format
    - competitor
    - delayed
    - no_budget
    - hard_stop
  # Auto-transition rules
  auto_qualify_after_messages: 3         # 2-я содержательная реплика лида → in_dialog
  require_nda_for_project_types: [ai_agents]   # NDA stage only for certain types
  silence_lost_threshold_d: 7            # silence on in_dialog >7d → lost(delayed)

# --- Scoring (Notion §5) ---
scoring:
  base_by_interaction_type:
    P1: 100   # прямой запрос / клик по рекламе
    P2: 60    # форма с сайта без потребности
    P3: 50    # возврат холодного лида
    P4: 30    # нейтральные ответы, комментарии
    P5: 20    # stories, реакции
    P6: 10    # написать первым (мы инициируем)
    HardStop: 0
  content_keywords:        # +N points if keyword present in lead message
    бюджет: 20
    дедлайн: 20
    срочно: 20
    тз: 15
    проект: 10
    интеграция: 10
    автоматизация: 10
    budget: 20
    deadline: 20
    urgent: 20
    project: 10
  source_weight:
    telegram: 1.0
    website: 1.0
    instagram: 0.8
    messenger: 0.8
    email: 0.6
  decay_per_48h: -1
  qualification_threshold: 80

# --- Temperature (Notion §7) ---
temperature:
  decay_days: 14
  frozen_after_days: 21
  triggers:
    warm:
      content_replies_count: 2
    hot:
      keywords: [цена, цены, сроки, портфолио, прайс, кейсы, price, timeline, portfolio, cases]
    ready:
      phrases:
        - "что нужно чтобы начать"
        - "готов начать"
        - "давайте начнём"
        - "what do we need to start"
        - "how do we start"
        - "ready to begin"

# --- Warming (Notion §14) ---
warming:
  hot:
    silence_max_d: 14
    cadence_d: 1
    formats: [direct_followup]
  warm:
    silence_max_d: 60
    cadence_d: 7
    formats: [case_study, content]
  cold:
    silence_max_d: 180
    cadence_d: 21
    formats: [content, offer]
  frozen:
    silence_max_d: 9999
    cadence_d: 90
    formats: [special_offer, archive]

# --- Operator mode (Notion §22) ---
operator_mode:
  default: autonomous     # autonomous | copilot | collaborative | manual
  confidence_gate: 0.7    # answer confidence < 0.7 → auto-route to copilot
  copilot_timeout_min: 5  # auto-send after operator silence in copilot mode

# --- Discount authority (Notion §10) ---
discount:
  enabled: false               # bot can offer discount only at risk-of-loss
  max_percent: 10
  auto_above_budget_threshold: 100000   # бюджет лида > X → handoff к оператору

# --- Pause-resume strategies (Notion §13, 6 types) ---
pause_strategies:
  unexplained:
    first_attempt_h: 4         # same channel, return to point
  busy_later:
    first_attempt_h: 24        # new angle
  named_date:
    use_named_date: true       # ping on the exact date
  awaiting_our_info:
    first_attempt_h: 24        # "got it?"
    second_attempt_d: 3        # new angle
  unanswered_question:
    first_attempt_h: 5         # rephrase simpler
  operator_pause:
    wait_for_release: true

# --- 7 escalation triggers (Notion §21) ---
escalation_triggers:
  - low_confidence              # answer confidence < confidence_gate
  - two_negatives_in_row
  - large_deal_above_threshold
  - legal_keywords              # «договор», «суд», «жалоба», «contract», «lawsuit»
  - dialog_loop                 # 3+ similar responses
  - explicit_handoff_request    # «соедини с менеджером», «manager please»
  - silence_after_24h
