# =============================================================================
# ШАБЛОН тенанта — копируется в tenants/<slug>/ скриптом deploy/new-client.sh.
# Плейсхолдеры __SLUG__ и __DISPLAY_NAME__ подставляются автоматически.
# Нишевое наполнение (воронка, прайс, тон) донастраивается онбордингом/конфиг-агентом
# и пресетами — здесь только валидные дефолты, чтобы тенант загрузился.
# =============================================================================

tenant_slug: __SLUG__
display_name: __DISPLAY_NAME__
languages: [ru, en]

brand:
  bot_persona_name: "Ассистент"
  system_prompt_path: "tenants/__SLUG__/system_prompt.md"
  greeting:
    ru: "Здравствуйте! Расскажите, что вас интересует — помогу и подскажу."
    en: "Hi! Tell me what you need — happy to help."

# Каналы: включаются по мере подключения ключей (см. онбординг → Каналы).
channels:
  telegram:
    enabled: true
    bot_username: ""
    operator_group_id_env: TELEGRAM_OPERATOR_GROUP_ID
  instagram:
    enabled: false
    page_id_env: META_PAGE_ID
  messenger:
    enabled: false
  website:
    enabled: true
    embed_url: ""
    widget_position: bottom-right
  whatsapp:
    enabled: false
  email:
    enabled: false

llm:
  provider: openrouter
  primary_model: "meta-llama/llama-3.3-70b-instruct"
  fallback_model: "deepseek/deepseek-chat"
  temperature: 0.2
  max_tokens: 1200

embeddings:
  model: "BAAI/bge-m3"
  device: cpu
  vector_store: pgvector

kb:
  path: "kb"
  chunk_size: 500
  chunk_overlap: 50

crm:
  provider_env: CRM_PROVIDER
  pipeline_name: "__DISPLAY_NAME__ Sales"
  auto_create_pipeline: true
  log_messages: true
  batch_interval_sec: 3
  retry_max_attempts: 3
  retry_backoff_sec: [1, 3, 10]

# Дефолтная воронка — нейтральная; нишевый пресет (онбординг) переопределит стадии в БД.
funnel:
  stages:
    - new_lead
    - in_dialog
    - qualified
    - on_call
    - proposal
    - prepayment
    - in_work
    - completed_won
    - post_sale
  lost_reasons:
    - price
    - not_our_format
    - competitor
    - delayed
    - no_budget
    - hard_stop
  auto_qualify_after_messages: 3
  require_nda_for_project_types: []
  silence_lost_threshold_d: 7

scoring:
  base_by_interaction_type:
    P1: 100
    P2: 60
    P3: 50
    P4: 30
    P5: 20
    P6: 10
    HardStop: 0
  content_keywords:
    бюджет: 20
    срочно: 20
    цена: 15
    заказать: 15
    budget: 20
    urgent: 20
    price: 15
  source_weight:
    telegram: 1.0
    website: 1.0
    instagram: 0.8
    messenger: 0.8
    whatsapp: 1.0
    email: 0.6
  decay_per_48h: -1
  qualification_threshold: 80

temperature:
  decay_days: 14
  frozen_after_days: 21
  triggers:
    warm:
      content_replies_count: 2
    hot:
      keywords: [цена, цены, сроки, прайс, стоимость, price, cost, when]
    ready:
      phrases:
        - "готов начать"
        - "давайте начнём"
        - "хочу заказать"
        - "ready to begin"
        - "how do we start"

warming:
  hot:
    silence_max_d: 14
    cadence_d: 1
    formats: [direct_followup]
  warm:
    silence_max_d: 60
    cadence_d: 7
    formats: [content]
  cold:
    silence_max_d: 180
    cadence_d: 21
    formats: [content, offer]
  frozen:
    silence_max_d: 9999
    cadence_d: 90
    formats: [special_offer, archive]

operator_mode:
  default: autonomous
  confidence_gate: 0.7
  copilot_timeout_min: 5

discount:
  enabled: false
  max_percent: 10
  auto_above_budget_threshold: 100000

pause_strategies:
  unexplained:
    first_attempt_h: 4
  busy_later:
    first_attempt_h: 24
  named_date:
    use_named_date: true
  awaiting_our_info:
    first_attempt_h: 24
    second_attempt_d: 3
  unanswered_question:
    first_attempt_h: 5
  operator_pause:
    wait_for_release: true

escalation_triggers:
  - low_confidence
  - two_negatives_in_row
  - large_deal_above_threshold
  - legal_keywords
  - dialog_loop
  - explicit_handoff_request
  - silence_after_24h
