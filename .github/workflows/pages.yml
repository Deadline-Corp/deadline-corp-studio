name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; never cancel an in-progress run so
# every push is reflected on the live site eventually.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true tells the action to auto-create the Pages
        # site on first run (otherwise it expects Pages to already exist).
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Repo root contains the static site (index.html, forge.html,
          # modes.css, modes.js, .nojekyll). Upload the whole tree.
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
