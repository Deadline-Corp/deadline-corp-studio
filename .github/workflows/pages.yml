name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; never cancel an in-progress run so
# every push is reflected on the live site eventually.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true tells the action to auto-create the Pages
        # site on first run (otherwise it expects Pages to already exist).
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Stage public site (exclude backend source + internal docs)
        # The repo root mixes the static site with the bot backend source and
        # internal docs. Publishing the whole tree would expose main.py,
        # channels/, db/ models, alembic migrations, the bot system prompt
        # (prompt-injection intel), CLAUDE.md and architecture docs on the
        # public domain. Stage only the site assets into _site/.
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='_site/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            --exclude='Deadline sales bot/' \
            --exclude='AI_Content_Factory/' \
            --exclude='Research/' \
            --exclude='Site_obsidian_source_of_truth/' \
            --exclude='CLAUDE.md' \
            --exclude='CHANGES_MATRIX_v2.md' \
            --exclude='Hermes_vs_OpenClaw_architecture.md' \
            --exclude='README.md' \
            ./ _site/

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
